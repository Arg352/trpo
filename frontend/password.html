<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Восстановление пароля — SmartPicker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 48px 40px;
            width: 400px;
            backdrop-filter: blur(16px);
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.4);
        }
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            margin: 0 auto 14px;
        }
        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            color: #f1f5f9;
            letter-spacing: 0.5px;
        }
        .subtitle {
            font-size: 13px;
            color: #64748b;
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
            font-size: 14px;
        }
        input[type="email"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px 14px 12px 40px;
            font-size: 14px;
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="email"]:focus {
            border-color: #3b82f6;
        }
        input[type="email"]::placeholder { color: #475569; }
        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .message {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        .message.success {
            background: rgba(16, 185, 129, 0.12);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
        }
        .message.error {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #64748b;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: #94a3b8; }
        .back-link i { margin-right: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon"><i class="fa-solid fa-key"></i></div>
            <h1>Восстановление пароля</h1>
        </div>
        <p class="subtitle">
            Введите email вашего аккаунта. Мы вышлем временный пароль для входа.
        </p>

        <form id="forgot-form">
            <div class="form-group">
                <label for="email-input">Email</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email-input" placeholder="your@email.com" required />
                </div>
            </div>
            <button type="submit" class="btn" id="submit-btn">
                <i class="fa-solid fa-paper-plane"></i> Отправить временный пароль
            </button>
        </form>

        <div class="message" id="message"></div>
        <a href="login.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Назад ко входу</a>
    </div>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email-input').value.trim();
            const btn = document.getElementById('submit-btn');
            const msg = document.getElementById('message');

            msg.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Отправка...';

            try {
                const res = await fetch('http://localhost:5000/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                msg.textContent = data.message || 'Временный пароль отправлен на указанный email.';
                msg.className = 'message success';
                msg.style.display = 'block';
                document.getElementById('email-input').value = '';
            } catch (err) {
                msg.textContent = 'Ошибка подключения к серверу.';
                msg.className = 'message error';
                msg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Отправить временный пароль';
            }
        });
    </script>
</body>
</html>
